# More option see https://github.com/DreamMaoMao/mango/wiki/

env=BROWSER,brave
env=XDG_SESSION_DESKTOP,mango
env=MOZ_ENABLE_WAYLAND,1
env=OZONE_PLATFORM,wayland
env=ELECTRON_OZONE_PLATFORM_HINT,wayland
env=GDK_BACKEND,wayland
env=QT_QPA_PLATFORM,wayland

# Output configuration
monitorrule=name:^eDP-1$,width:1920,height:1080

# Input configuration
xkb_rules_layout=us,sk
xkb_rules_variant=,qwerty
xkb_rules_options=grp:alt_shift_toggle
numlockon=1
disable_while_typing=1
trackpad_natural_scrolling=1

# Miscellaneous
xwayland_persistence=0
cursor_hide_timeout=5
sloppyfocus=0
single_scratchpad=1

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.75
scratchpad_height_ratio=0.75
borderpx=3
bordercolor=0x05050e00
focuscolor=0xb4befeff
scratchpadcolor=0xfab387ff
cursor_size=24
cursor_theme=Qogir

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=12
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
animations=1
layer_animations=0
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=300
animation_duration_close=0
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1
tag_animation_direction=0

# Scroller Layout Setting
bind=SUPER,s,setlayout,scroller
bind=SUPER,Apostrophe,switch_proportion_preset
scroller_structs=10
scroller_default_proportion=0.75
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=0.75
scroller_proportion_preset=1.0,0.75,0.5

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
overviewgappi=5
overviewgappo=30

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller

# Startup
exec-once=/usr/bin/lxpolkit
exec-once=foot --server
exec-once=mako
exec-once=swaybg -m fill -i ~/.wallpaper
exec-once=~/.config/mango/scripts/swayidle_setup
exec-once=waybar -c ~/.config/waybar/config-mango.jsonc

# Key Bindings

# reload config
bind=SUPER,r,reload_config

# Applications
bind=SUPER,space,spawn,fuzzel
bind=SUPER,Return,spawn,footclient
bind=SUPER,b,spawn,brave
bind=SUPER,e,spawn_shell,pcmanfm; systemctl --user stop gvfs*
bind=SUPER,m,spawn,~/.config/mango/scripts/fuzzel-usb-mount
bind=SUPER,n,spawn,~/.config/mango/scripts/fuzzel-network-mount
bind=SUPER,l,spawn,swaylock
bind=SUPER,Period,spawn,~/.config/mango/scripts/fuzzel-config
bind=SUPER,Escape,spawn,footclient --app-id btop btop
bind=SUPER,Slash,toggle_named_scratchpad,yazi,none,footclient --app-id yazi bash -ic 'yazi'
bind=SUPER+SHIFT,b,spawn,killall -SIGUSR2 waybar
bind=SUPER+Ctrl,w,spawn,~/.config/mango/scripts/fuzzel-webapp
bind=SUPER+Ctrl,d,spawn,~/.config/mango/scripts/fuzzel-adoc
bind=SUPER+Ctrl,o,spawn,~/.config/mango/scripts/fuzzel-outputs

bind=NONE,Print,spawn,~/.config/mango/scripts/screenshot full
bind=Shift,Print,spawn,~/.config/mango/scripts/screenshot area

bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +5%
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 5%-
bind=SHIFT,XF86MonBrightnessDown,spawn,brightnessctl s 1%

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

# exit
# bind=SUPER,m,quit
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,q,spawn,~/.config/mango/scripts/fuzzel-power

# switch window focus
bind=SUPER,Tab,focuslast
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER+Ctrl,Space,togglefloating,
bind=SUPER+Ctrl,f,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,

# switch layout
bind=SUPER,z,switch_layout

# tag switch
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=SUPER+Shift,1,tag,1,0
bind=SUPER+Shift,2,tag,2,0
bind=SUPER+Shift,3,tag,3,0
bind=SUPER+Shift,4,tag,4,0
bind=SUPER+Shift,5,tag,5,0
bind=SUPER+Shift,6,tag,6,0
bind=SUPER+Shift,7,tag,7,0
bind=SUPER+Shift,8,tag,8,0
bind=SUPER+Shift,9,tag,9,0

# monitor switch
bind=SUPER+Ctrl,Left,focusmon,left
bind=SUPER+Ctrl,Right,focusmon,right
bind=SUPER+Ctrl,Up,focusmon,up
bind=SUPER+Ctrl,Down,focusmon,down

# move window to monitor
bind=SUPER+Ctrl+Shift,Left,tagmon,left
bind=SUPER+Ctrl+Shift,Right,tagmon,right
bind=SUPER+Ctrl+Shift,Up,tagmon,up
bind=SUPER+Ctrl+Shift,Down,tagmon,down

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0 
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Window rules
windowrule=scroller_proportion:1.0,appid:brave-browser
windowrule=focused_opacity:0.97,appid:footclient
windowrule=unfocused_opacity:0.8,appid:footclient
windowrule=isfloating:1,appid:gnome-calculator
windowrule=isfloating:1,appid:nm-connection-editor
windowrule=isfloating:1,appid:blueman-manager
windowrule=isfloating:1,appid:pinentry-gtk
windowrule=isfloating:1,width:800,height:400,appid:pavucontrol
windowrule=isfloating:1,width:1000,height:600,appid:wdisplays
windowrule=isnamedscratchpad:1,width:1500,height:800,appid:yazi

